services:
  # Наш бот
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # URL Local Bot API (контейнер bot-api) — файлы до 2 ГБ
      BOT_API_URL: http://bot-api:8081
    depends_on:
      postgres:
        condition: service_healthy
      bot-api:
        condition: service_healthy
      warp:
        condition: service_healthy
    volumes:
      # tmp для скачанных видео (не занимает место в контейнере)
      - /tmp/vk_bot:/tmp/vk_bot
      # доступ к файлам Local Bot API
      - bot-api-data:/var/lib/telegram-bot-api
      # cookies для 18+/приватного/сторис (опционально — положи файл cookies.txt)
      - ./cookies:/app/cookies
      # Docker socket — для перезапуска WARP при блокировке IP
      - /var/run/docker.sock:/var/run/docker.sock


  # Local Bot API — файлы до 2 ГБ без ограничений
  # Нужен если VK-видео могут превышать 50 МБ (обычный Telegram Bot API лимит)
  bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      # Унифицированная раскладка всех ботов на сервере:
      # YouTube 8081 / Insta 8082 / TikTok 8091 / Twitter 8092 /
      # Facebook 8093 / Twitch 8094 / VK 8095
      - "${BOT_API_PORT:-8111}:8081"
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
      - /tmp/vk_bot:/tmp/vk_bot
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/ > /dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Автоперезапуск unhealthy контейнеров
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bot_4_vk}
      POSTGRES_USER: ${DB_USER:-bot_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot_user} -d ${DB_NAME:-bot_4_vk}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cloudflare WARP — fallback-прокси если резидентный упал или VK вернул гео-блок.
  # На VPS в Германии часто блокируются серверные IP — WARP выдаёт клиентский.
  warp:
    image: ghcr.io/mon-ius/docker-warp-socks:v5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -x socks5://127.0.0.1:9091 -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -q warp=on"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # TODO: domain-агент — добавить Redis если нужен:
  # - RedisStorage для FSM (не теряется при рестартах)
  # - Redis rate limit (переживает рестарты)
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data

volumes:
  postgres-data:
  bot-api-data:
  # warp-data:    # раскомментировать вместе с warp сервисом (см. выше)
  # redis-data:   # TODO: раскомментировать вместе с redis сервисом
